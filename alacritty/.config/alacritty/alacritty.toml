[env]
TERM = "xterm-256color"

[font]
size = 10.0

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[scrolling]
history = 10000

[window]
dynamic_padding = false
dynamic_title = true
title = "Alacritty"
opacity = 0.9

[colors]
draw_bold_text_with_bright_colors = false

[general]
import = ["~/.config/alacritty/theme/catppuccin-macchiato.toml"]
